<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">AI术语词典</div>
  <div class="nav-right">
    <a href="index.html">首页</a>
    <a href="materials.html">资料</a>
    <a href="favorites.html">收藏</a>
  </div>
</nav>

<div class="container">
  <h1>我的收藏</h1>
  <div id="favList"></div>
</div>

<script>
const favs = JSON.parse(localStorage.getItem('favs') || '[]')
const list = document.getElementById('favList')
if (favs.length === 0) list.innerHTML = '<p>暂无收藏</p>'
else favs.forEach(t => {
  list.innerHTML += `<div style="padding:10px;background:#fff;border-radius:8px;margin:6px 0">${t}</div>`
})
</script>

</body>
</html>
