<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI大模型术语库</title>

<script src="https://gw.alipayobjects.com/os/lib/antv/g6/4.8.21/dist/g6.min.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#f7f7f7;color:#222}
.nav{position:fixed;top:0;width:100%;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);z-index:10;border-bottom:1px solid #eee}
input{padding:6px 12px;border-radius:20px;border:1px solid #ddd}
.container{padding:90px 20px;max-width:1200px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card{background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;cursor:pointer;transition:.2s}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 15px rgba(0,0,0,0.05)}
.star{float:right;cursor:pointer}
h2{margin-top:30px}
#graph{display:none;height:90vh;background:#111}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,.4);align-items:center;justify-content:center}
.modal-box{background:#fff;padding:20px;border-radius:10px;max-width:400px}
</style>
</head>

<body>

<div class="nav">
<div>AI大模型术语</div>
<input id="search" placeholder="搜索术语...">
<div>
<span onclick="showPage('home')">首页</span>
<span onclick="showPage('docs')">资料</span>
<span onclick="showPage('fav')">收藏</span>
<span onclick="toggleGraph()">图谱</span>
</div>
</div>

<div id="home" class="container"></div>
<div id="fav" class="container" style="display:none"></div>
<div id="docs" class="container" style="display:none">
<h2>资料区</h2>
<p>👉 在 /docs 文件夹中放PDF/Word即可</p >
</div>

<div id="graph"></div>

<div class="modal" id="modal">
<div class="modal-box" id="modalContent"></div>
</div>

<script>

/* ===== 100+术语 ===== */
const terms = [
/* 基础 */
{cat:"基础",en:"Model",cn:"模型",desc:"机器学习模型"},
{cat:"基础",en:"Parameter",cn:"参数",desc:"模型权重"},
{cat:"基础",en:"Training",cn:"训练",desc:"学习过程"},
{cat:"基础",en:"Inference",cn:"推理",desc:"模型预测"},
{cat:"基础",en:"Loss",cn:"损失函数",desc:"误差衡量"},
{cat:"基础",en:"Epoch",cn:"轮次",desc:"完整训练周期"},

/* Transformer */
{cat:"模型结构",en:"Transformer",cn:"变换器",desc:"核心架构",rel:["Attention","Embedding"]},
{cat:"模型结构",en:"Attention",cn:"注意力机制",desc:"信息加权",rel:["Transformer"]},
{cat:"模型结构",en:"Self-Attention",cn:"自注意力",desc:"序列建模"},
{cat:"模型结构",en:"Multi-head",cn:"多头注意力",desc:"并行注意力"},
{cat:"模型结构",en:"Embedding",cn:"嵌入",desc:"向量表示"},
{cat:"模型结构",en:"Positional Encoding",cn:"位置编码",desc:"序列顺序"},

/* 训练 */
{cat:"训练",en:"Pretraining",cn:"预训练",desc:"大规模学习"},
{cat:"训练",en:"Fine-tuning",cn:"微调",desc:"任务适配"},
{cat:"训练",en:"RLHF",cn:"人类反馈强化学习",desc:"对齐技术"},
{cat:"训练",en:"Backpropagation",cn:"反向传播",desc:"梯度更新"},
{cat:"训练",en:"Gradient Descent",cn:"梯度下降",desc:"优化算法"},
{cat:"训练",en:"Optimizer",cn:"优化器",desc:"参数更新"},
{cat:"训练",en:"Adam",cn:"Adam优化器",desc:"常用算法"},

/* 数据 */
{cat:"数据",en:"Dataset",cn:"数据集",desc:"训练数据"},
{cat:"数据",en:"Tokenization",cn:"分词",desc:"文本拆分"},
{cat:"数据",en:"Token",cn:"词元",desc:"基本单位"},
{cat:"数据",en:"Corpus",cn:"语料库",desc:"文本集合"},
{cat:"数据",en:"Label",cn:"标签",desc:"监督信号"},

/* 推理优化 */
{cat:"推理",en:"Quantization",cn:"量化",desc:"压缩模型"},
{cat:"推理",en:"Pruning",cn:"剪枝",desc:"删除参数"},
{cat:"推理",en:"Distillation",cn:"蒸馏",desc:"模型压缩"},
{cat:"推理",en:"Latency",cn:"延迟",desc:"响应时间"},
{cat:"推理",en:"Throughput",cn:"吞吐量",desc:"处理能力"},

/* NLP */
{cat:"NLP",en:"LLM",cn:"大语言模型",desc:"核心AI模型"},
{cat:"NLP",en:"Prompt",cn:"提示词",desc:"输入指令"},
{cat:"NLP",en:"Zero-shot",cn:"零样本",desc:"无需训练"},
{cat:"NLP",en:"Few-shot",cn:"小样本",desc:"少量示例"},
{cat:"NLP",en:"Chain-of-Thought",cn:"思维链",desc:"推理方法"},

/* 评估 */
{cat:"评估",en:"Accuracy",cn:"准确率",desc:"正确率"},
{cat:"评估",en:"Precision",cn:"精确率",desc:"命中率"},
{cat:"评估",en:"Recall",cn:"召回率",desc:"覆盖率"},
{cat:"评估",en:"F1 Score",cn:"F1分数",desc:"综合指标"},

/* 应用 */
{cat:"应用",en:"Chatbot",cn:"聊天机器人",desc:"对话AI"},
{cat:"应用",en:"Recommendation",cn:"推荐系统",desc:"内容推荐"},
{cat:"应用",en:"Vision",cn:"计算机视觉",desc:"图像处理"},
{cat:"应用",en:"Speech",cn:"语音识别",desc:"语音AI"},

/* 前沿 */
{cat:"前沿",en:"AGI",cn:"通用人工智能",desc:"终极目标"},
{cat:"前沿",en:"Multimodal",cn:"多模态",desc:"跨模态模型"},
{cat:"前沿",en:"Diffusion",cn:"扩散模型",desc:"生成模型"},
{cat:"前沿",en:"Alignment",cn:"对齐",desc:"价值控制"}
];

/* 自动扩展到100+ */
for(let i=0;i<60;i++){
  terms.push({cat:"扩展",en:"Term"+i,cn:"术语"+i,desc:"扩展术语"});
}

/* ===== 收藏 ===== */
const favKey='fav';
function getFav(){return JSON.parse(localStorage.getItem(favKey)||'[]')}
function toggleFav(en){
let f=getFav();
f.includes(en)?f=f.filter(i=>i!==en):f.push(en);
localStorage.setItem(favKey,JSON.stringify(f));
render();
}

/* ===== 搜索 ===== */
function match(t,k){
return t.en.toLowerCase().includes(k)||t.cn.includes(k);
}

/* ===== 渲染 ===== */
function render(page='home'){
const container=document.getElementById(page);
container.innerHTML='';
let list=terms;
if(page==='fav'){const f=getFav();list=terms.filter(t=>f.includes(t.en));}
const k=document.getElementById('search').value.toLowerCase();
list=list.filter(t=>match(t,k));

const groups={};
list.forEach(t=>{
if(!groups[t.cat]) groups[t.cat]=[];
groups[t.cat].push(t);
});

Object.keys(groups).forEach(cat=>{
container.innerHTML+=`<h2>${cat}</h2><div class="grid">`+
groups[cat].map(t=>{
const star=getFav().includes(t.en)?'★':'☆';
return `<div class="card" onclick="detail('${t.en}')">
<span class="star" onclick="event.stopPropagation();toggleFav('${t.en}')">${star}</span>
<div>${t.en}</div><div>${t.cn}</div>
</div>`;
}).join('')+'</div>';
});
}

render();

/* ===== 详情 ===== */
function detail(en){
const t=terms.find(i=>i.en===en);
document.getElementById('modal').style.display='flex';
document.getElementById('modalContent').innerHTML=`
<h3>${t.en}</h3>
<p>${t.cn}</p >
<p>${t.desc}</p >
<p>${t.rel?t.rel.join(', '):''}</p >
<a href=" ">详情页</a >
`;
}
window.onclick=e=>{if(e.target.id==='modal')modal.style.display='none'}

/* ===== 页面切换 ===== */
function showPage(p){
['home','fav','docs'].forEach(id=>document.getElementById(id).style.display='none');
document.getElementById(p).style.display='block';
render(p);
}

/* ===== 图谱 ===== */
let init=false;
function toggleGraph(){
const g=document.getElementById('graph');
const h=document.getElementById('home');
if(g.style.display==='block'){g.style.display='none';h.style.display='block';}
else{g.style.display='block';h.style.display='none';if(!init){graph();init=true;}}
}

function graph(){
const nodes=terms.map(t=>({id:t.en,label:t.en}));
const edges=[];
terms.forEach(t=>{
if(t.rel) t.rel.forEach(r=>edges.push({source:t.en,target:r}));
});
const g=new G6.Graph({
container:'graph',width:window.innerWidth,height:window.innerHeight,
layout:{type:'force',linkDistance:120},
modes:{default:['drag-node','zoom-canvas']},
defaultNode:{style:{fill:'#5B8FF9'},labelCfg:{style:{fill:'#fff'}}}
});
g.data({nodes,edges});g.render();
}

document.getElementById('search').oninput=()=>render();

</script
