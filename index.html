<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 术语中英词典</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        /* 顶部标题和统计 */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .stats {
            font-size: 1.2em;
            color: #7f8c8d;
        }
        /* 搜索框 */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus {
            border-color: #3498db;
        }
        /* 分类筛选 */
        .filter-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }
        .filter-btn {
            padding: 8px 16px;
            background-color: #ecf0f1;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.3s, color 0.3s;
        }
        .filter-btn.active {
            background-color: #3498db;
            color: white;
        }
        .filter-btn:hover {
            background-color: #bdc3c7;
        }
        /* 收藏按钮 */
        .favorites-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .favorites-btn {
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }
        .favorites-btn:hover {
            background-color: #c0392b;
        }
        /* 卡片列表 */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }
        .card .term {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .card .translation {
            color: #7f8c8d;
        }
        .card .favorite-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.5em;
            color: #e74c3c;
            cursor: pointer;
            transition: color 0.3s;
        }
        .card .favorite-icon.favorited {
            color: #e74c3c;
        }
        .card .favorite-icon:not(.favorited) {
            color: #ddd;
        }
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background-color: white;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 1.5em;
            font-weight: bold;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #7f8c8d;
        }
        .modal-body {
            line-height: 1.6;
        }
        .definition {
            margin-bottom: 20px;
        }
        .definition h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .image-section {
            margin-bottom: 20px;
            text-align: center;
        }
        .image-section img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .references {
            margin-bottom: 20px;
        }
        .references h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .references a {
            display: block;
            color: #3498db;
            text-decoration: none;
            margin-bottom: 5px;
        }
        .references a:hover {
            text-decoration: underline;
        }
        .notes {
            margin-bottom: 20px;
        }
        .notes h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            .cards-container {
                grid-template-columns: 1fr;
            }
            .filter-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 术语中英词典</h1>
            <div class="stats">总计 <span id="total-terms">0</span> 个术语</div>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="搜索术语（中英双语）" id="search-input">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="基础">基础</button>
            <button class="filter-btn" data-category="模型">模型</button>
            <button class="filter-btn" data-category="训练">训练</button>
            <button class="filter-btn" data-category="多模态">多模态</button>
            <button class="filter-btn" data-category="部署">部署</button>
            <button class="filter-btn" data-category="安全">安全</button>
        </div>
        <div class="favorites-toggle">
            <button class="favorites-btn" id="favorites-btn">显示收藏</button>
        </div>
        <div class="cards-container" id="cards-container">
            <!-- 卡片将通过 JS 动态生成 -->
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modal-title"></div>
                <button class="close-btn" id="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="definition">
                    <h3>英文定义</h3>
                    <p id="en-definition"></p>
                    <h3>中文定义</h3>
                    <p id="zh-definition"></p>
                </div>
                <div class="image-section">
                    <h3>图片展示</h3>
                    <img id="term-image" src="" alt="术语图片">
                </div>
                <div class="references">
                    <h3>参考资料</h3>
                    <a id="ref1" href="" target="_blank"></a>
                    <a id="ref2" href="" target="_blank"></a>
                </div>
                <div class="notes">
                    <h3>补充说明</h3>
                    <p id="notes"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 可编辑区域：术语数据数组
        // 每个术语对象包含：英文、中文、英文定义、中文定义、图片链接、参考链接1、参考链接2、补充说明、分类
        const terms = [
            // 基础 (约20个)
            { en: "Artificial Intelligence", zh: "人工智能", enDef: "The simulation of human intelligence processes by machines, especially computer systems.", zhDef: "机器，特别是计算机系统，模拟人类智能过程。", image: "https://via.placeholder.com/400x200?text=AI", ref1: "https://en.wikipedia.org/wiki/Artificial_intelligence", ref2: "https://www.ibm.com/topics/artificial-intelligence", notes: "人工智能是计算机科学的一个分支，致力于创建能够执行通常需要人类智能的任务的系统。", category: "基础" },
            { en: "Machine Learning", zh: "机器学习", enDef: "A subset of AI that enables systems to learn and improve from experience without being explicitly programmed.", zhDef: "人工智能的一个子集，使系统能够从经验中学习和改进，而无需显式编程。", image: "https://via.placeholder.com/400x200?text=ML", ref1: "https://en.wikipedia.org/wiki/Machine_learning", ref2: "https://developers.google.com/machine-learning/crash-course", notes: "机器学习是数据科学的核心，通过算法从数据中学习模式。", category: "基础" },
            { en: "Deep Learning", zh: "深度学习", enDef: "A subset of machine learning using neural networks with multiple layers.", zhDef: "机器学习的一个子集，使用具有多层的神经网络。", image: "https://via.placeholder.com/400x200?text=DL", ref1: "https://en.wikipedia.org/wiki/Deep_learning", ref2: "https://www.deeplearning.ai/", notes: "深度学习模仿人脑的神经网络结构，用于复杂模式识别。", category: "基础" },
            { en: "Neural Network", zh: "神经网络", enDef: "A computing system inspired by biological neural networks.", zhDef: "受生物神经网络启发的计算系统。", image: "https://via.placeholder.com/400x200?text=NN", ref1: "https://en.wikipedia.org/wiki/Artificial_neural_network", ref2: "https://cs231n.github.io/", notes: "神经网络由互连的节点组成，能够学习和处理信息。", category: "基础" },
            { en: "Algorithm", zh: "算法", enDef: "A set of rules or processes followed by a computer to perform calculations or solve problems.", zhDef: "计算机遵循的一组规则或过程，用于执行计算或解决问题。", image: "https://via.placeholder.com/400x200?text=Algo", ref1: "https://en.wikipedia.org/wiki/Algorithm", ref2: "https://www.geeksforgeeks.org/fundamentals-of-algorithms/", notes: "算法是计算机程序的基础，定义了解决特定问题的步骤。", category: "基础" },
            { en: "Data Mining", zh: "数据挖掘", enDef: "The process of discovering patterns in large data sets.", zhDef: "在大型数据集中发现模式的过程。", image: "https://via.placeholder.com/400x200?text=DM", ref1: "https://en.wikipedia.org/wiki/Data_mining", ref2: "https://www.oracle.com/data-science/data-mining.html", notes: "数据挖掘从数据中提取有价值的见解和知识。", category: "基础" },
            { en: "Big Data", zh: "大数据", enDef: "Extremely large data sets that may be analyzed computationally to reveal patterns.", zhDef: "可能通过计算分析以揭示模式的极大数据集。", image: "https://via.placeholder.com/400x200?text=BD", ref1: "https://en.wikipedia.org/wiki/Big_data", ref2: "https://aws.amazon.com/big-data/", notes: "大数据处理需要特殊的工具和技术来管理海量信息。", category: "基础" },
            { en: "Computer Vision", zh: "计算机视觉", enDef: "A field of AI that trains computers to interpret and understand visual information.", zhDef: "人工智能的一个领域，训练计算机解释和理解视觉信息。", image: "https://via.placeholder.com/400x200?text=CV", ref1: "https://en.wikipedia.org/wiki/Computer_vision", ref2: "https://opencv.org/", notes: "计算机视觉使机器能够像人类一样“看”和理解图像。", category: "基础" },
            { en: "Natural Language Processing", zh: "自然语言处理", enDef: "A branch of AI that helps computers understand, interpret, and manipulate human language.", zhDef: "人工智能的一个分支，帮助计算机理解、解释和操纵人类语言。", image: "https://via.placeholder.com/400x200?text=NLP", ref1: "https://en.wikipedia.org/wiki/Natural_language_processing", ref2: "https://huggingface.co/", notes: "NLP 使计算机能够处理和生成人类语言。", category: "基础" },
            { en: "Supervised Learning", zh: "监督学习", enDef: "A type of machine learning where the model is trained on labeled data.", zhDef: "一种机器学习类型，其中模型在标记数据上进行训练。", image: "https://via.placeholder.com/400x200?text=SL", ref1: "https://en.wikipedia.org/wiki/Supervised_learning", ref2: "https://scikit-learn.org/stable/supervised_learning.html", notes: "监督学习使用已知输出来训练模型预测新数据。", category: "基础" },
            { en: "Unsupervised Learning", zh: "无监督学习", enDef: "A type of machine learning where the model finds patterns in unlabeled data.", zhDef: "一种机器学习类型，其中模型在未标记数据中发现模式。", image: "https://via.placeholder.com/400x200?text=UL", ref1: "https://en.wikipedia.org/wiki/Unsupervised_learning", ref2: "https://scikit-learn.org/stable/unsupervised_learning.html", notes: "无监督学习用于发现数据中的隐藏结构。", category: "基础" },
            { en: "Reinforcement Learning", zh: "强化学习", enDef: "A type of machine learning where an agent learns by interacting with its environment.", zhDef: "一种机器学习类型，其中代理通过与环境互动来学习。", image: "https://via.placeholder.com/400x200?text=RL", ref1: "https://en.wikipedia.org/wiki/Reinforcement_learning", ref2: "https://spinningup.openai.com/en/latest/", notes: "强化学习通过奖励和惩罚来优化决策。", category: "基础" },
            { en: "Feature Engineering", zh: "特征工程", enDef: "The process of selecting and transforming variables for use in machine learning models.", zhDef: "选择和转换变量以用于机器学习模型的过程。", image: "https://via.placeholder.com/400x200?text=FE", ref1: "https://en.wikipedia.org/wiki/Feature_engineering", ref2: "https://www.kaggle.com/learn/feature-engineering", notes: "特征工程是提高模型性能的关键步骤。", category: "基础" },
            { en: "Overfitting", zh: "过拟合", enDef: "When a model performs well on training data but poorly on new data.", zhDef: "当模型在训练数据上表现良好，但在新数据上表现不佳时。", image: "https://via.placeholder.com/400x200?text=OF", ref1: "https://en.wikipedia.org/wiki/Overfitting", ref2: "https://developers.google.com/machine-learning/crash-course/overfitting", notes: "过拟合是机器学习中的常见问题，需要正则化技术来解决。", category: "基础" },
            { en: "Underfitting", zh: "欠拟合", enDef: "When a model is too simple to capture the underlying pattern in the data.", zhDef: "当模型过于简单，无法捕捉数据中的底层模式时。", image: "https://via.placeholder.com/400x200?text=UF", ref1: "https://en.wikipedia.org/wiki/Overfitting#Underfitting", ref2: "https://developers.google.com/machine-learning/crash-course/overfitting", notes: "欠拟合通常通过增加模型复杂度来解决。", category: "基础" },
            { en: "Bias-Variance Tradeoff", zh: "偏差-方差权衡", enDef: "The balance between a model's ability to fit training data and generalize to new data.", zhDef: "模型拟合训练数据能力和泛化到新数据之间的平衡。", image: "https://via.placeholder.com/400x200?text=BVT", ref1: "https://en.wikipedia.org/wiki/Bias%E2%80%93variance_tradeoff", ref2: "https://developers.google.com/machine-learning/crash-course/generalization/bias-and-variance", notes: "偏差-方差权衡是机器学习模型选择的核心概念。", category: "基础" },
            { en: "Cross-Validation", zh: "交叉验证", enDef: "A technique to evaluate model performance by dividing data into training and testing sets.", zhDef: "一种通过将数据分为训练和测试集来评估模型性能的技术。", image: "https://via.placeholder.com/400x200?text=CV", ref1: "https://en.wikipedia.org/wiki/Cross-validation_(statistics)", ref2: "https://scikit-learn.org/stable/modules/cross_validation.html", notes: "交叉验证有助于防止过拟合并评估模型的泛化能力。", category: "基础" },
            { en: "Hyperparameter Tuning", zh: "超参数调优", enDef: "The process of optimizing the parameters that control the learning process.", zhDef: "优化控制学习过程的参数的过程。", image: "https://via.placeholder.com/400x200?text=HT", ref1: "https://en.wikipedia.org/wiki/Hyperparameter_optimization", ref2: "https://optuna.org/", notes: "超参数调优对于提高模型性能至关重要。", category: "基础" },
            { en: "Ensemble Learning", zh: "集成学习", enDef: "A technique that combines multiple models to improve prediction accuracy.", zhDef: "一种结合多个模型以提高预测准确性的技术。", image: "https://via.placeholder.com/400x200?text=EL", ref1: "https://en.wikipedia.org/wiki/Ensemble_learning", ref2: "https://scikit-learn.org/stable/modules/ensemble.html", notes: "集成学习如随机森林和梯度提升是强大的机器学习方法。", category: "基础" },
            { en: "Transfer Learning", zh: "迁移学习", enDef: "A technique where a model trained on one task is reused for another related task.", zhDef: "一种技术，其中在一个任务上训练的模型被重用于另一个相关任务。", image: "https://via.placeholder.com/400x200?text=TL", ref1: "https://en.wikipedia.org/wiki/Transfer_learning", ref2: "https://keras.io/guides/transfer_learning/", notes: "迁移学习减少了对大量数据的需要，提高了效率。", category: "基础" },
            // 模型 (约20个)
            { en: "Convolutional Neural Network", zh: "卷积神经网络", enDef: "A type of neural network designed for processing grid-like data, such as images.", zhDef: "一种设计用于处理网格状数据（如图像）的神经网络类型。", image: "https://via.placeholder.com/400x200?text=CNN", ref1: "https://en.wikipedia.org/wiki/Convolutional_neural_network", ref2: "https://cs231n.github.io/convolutional-networks/", notes: "CNN 在图像识别和计算机视觉任务中非常有效。", category: "模型" },
            { en: "Recurrent Neural Network", zh: "循环神经网络", enDef: "A type of neural network that processes sequential data by maintaining internal state.", zhDef: "一种通过维护内部状态来处理顺序数据的神经网络类型。", image: "https://via.placeholder.com/400x200?text=RNN", ref1: "https://en.wikipedia.org/wiki/Recurrent_neural_network", ref2: "https://colah.github.io/posts/2015-08-Understanding-LSTMs/", notes: "RNN 适用于时间序列和自然语言处理。", category: "模型" },
            { en: "Long Short-Term Memory", zh: "长短期记忆", enDef: "A type of RNN designed to remember information for long periods.", zhDef: "一种设计用于长时间记忆信息的 RNN 类型。", image: "https://via.placeholder.com/400x200?text=LSTM", ref1: "https://en.wikipedia.org/wiki/Long_short-term_memory", ref2: "https://colah.github.io/posts/2015-08-Understanding-LSTMs/", notes: "LSTM 解决了 RNN 的梯度消失问题。", category: "模型" },
            { en: "Transformer", zh: "变换器", enDef: "A neural network architecture based on self-attention mechanisms.", zhDef: "一种基于自注意力机制的神经网络架构。", image: "https://via.placeholder.com/400x200?text=Transformer", ref1: "https://en.wikipedia.org/wiki/Transformer_(machine_learning_model)", ref2: "https://arxiv.org/abs/1706.03762", notes: "Transformer 是现代 NLP 模型的基础，如 BERT 和 GPT。", category: "模型" },
            { en: "Generative Adversarial Network", zh: "生成对抗网络", enDef: "A framework where two neural networks compete to generate realistic data.", zhDef: "一个框架，其中两个神经网络竞争以生成真实数据。", image: "https://via.placeholder.com/400x200?text=GAN", ref1: "https://en.wikipedia.org/wiki/Generative_adversarial_network", ref2: "https://arxiv.org/abs/1406.2661", notes: "GAN 用于生成图像、视频和文本。", category: "模型" },
            { en: "Autoencoder", zh: "自动编码器", enDef: "A neural network that learns to compress and reconstruct data.", zhDef: "一种学习压缩和重建数据的神经网络。", image: "https://via.placeholder.com/400x200?text=AE", ref1: "https://en.wikipedia.org/wiki/Autoencoder", ref2: "https://blog.keras.io/building-autoencoders-in-keras.html", notes: "自动编码器用于降维和特征学习。", category: "模型" },
            { en: "Variational Autoencoder", zh: "变分自动编码器", enDef: "A type of autoencoder that generates new data by learning a probabilistic distribution.", zhDef: "一种通过学习概率分布来生成新数据的自动编码器类型。", image: "https://via.placeholder.com/400x200?text=VAE", ref1: "https://en.wikipedia.org/wiki/Variational_autoencoder", ref2: "https://arxiv.org/abs/1312.6114", notes: "VAE 用于生成模型和半监督学习。", category: "模型" },

            { en: "Data Poisoning", zh: "数据中毒", enDef: "Maliciously altering training data to compromise model performance.", zhDef: "恶意更改训练数据以损害模型性能。", image: "https://via.placeholder.com/400x200?text=DP", ref1: "https://en.wikipedia.org/wiki/Data_poisoning", ref2: "https://arxiv.org/abs/1804.07933", notes: "数据中毒是训练阶段的攻击。", category: "安全" },
            { en: "Model Inversion", zh: "模型反转", enDef: "Reconstructing training data from model outputs.", zhDef: "从模型输出重建训练数据。", image: "https://via.placeholder.com/400x200?text=MI", ref1: "https://en.wikipedia.org/wiki/Model_inversion_attack", ref2: "https://arxiv.org/abs/1912.12353", notes: "模型反转威胁隐私。", category: "安全" },
            { en: "Membership Inference", zh: "成员推理", enDef: "Determining whether a particular data point was used in training.", zhDef: "确定特定数据点是否用于训练。", image: "https://via.placeholder.com/400x200?text=MemInf", ref1: "https://en.wikipedia.org/wiki/Membership_inference_attack", ref2: "https://arxiv.org/abs/1610.05820", notes: "成员推理攻击隐私。", category: "安全" },
            { en: "Explainable AI", zh: "可解释 AI", enDef: "Techniques to make AI decisions understandable to humans.", zhDef: "使 AI 决策对人类可理解的技术。", image: "https://via.placeholder.com/400x200?text=XAI", ref1: "https://en.wikipedia.org/wiki/Explainable_artificial_intelligence", ref2: "https://christophm.github.io/interpretable-ml-book/", notes: "可解释 AI 提高了信任和问责制。", category: "安全" },
            { en: "Fairness in AI", zh: "AI 公平性", enDef: "Ensuring AI systems do not discriminate against protected groups.", zhDef: "确保 AI 系统不对受保护群体进行歧视。", image: "https://via.placeholder.com/400x200?text=FairAI", ref1: "https://en.wikipedia.org/wiki/Algorithmic_bias", ref2: "https://fairlearn.org/", notes: "AI 公平性是道德 AI 的关键。", category: "安全" },
            { en: "Robustness", zh: "鲁棒性", enDef: "The ability of a model to maintain performance under perturbations.", zhDef: "模型在扰动下保持性能的能力。", image: "https://via.placeholder.com/400x200?text=Robust", ref1: "https://en.wikipedia.org/wiki/Robustness_(computer_science)", ref2: "https://arxiv.org/abs/1804.05866", notes: "鲁棒性是安全 AI 的基础。", category: "安全" },
            { en: "Differential Privacy", zh: "差分隐私", enDef: "A framework for quantifying privacy loss in data analysis.", zhDef: "量化数据分析中隐私损失的框架。", image: "https://via.placeholder.com/400x200?text=DP", ref1: "https://en.wikipedia.org/wiki/Differential_privacy", ref2: "https://privacytools.seas.harvard.edu/differential-privacy", notes: "差分隐私提供了数学保证的隐私保护。", category: "安全" },
            { en: "Federated Learning", zh: "联邦学习", enDef: "Training models across decentralized devices while preserving privacy.", zhDef: "在保护隐私的同时跨分散设备训练模型。", image: "https://via.placeholder.com/400x200?text=FL", ref1: "https://en.wikipedia.org/wiki/Federated_learning", ref2: "https://ai.googleblog.com/2017/04/federated-learning-collaborative.html", notes: "联邦学习是隐私保护机器学习的范例。", category: "安全" }
        ];

        // 全局变量
        let currentCategory = 'all';
        let showFavorites = false;
        let favorites = JSON.parse(localStorage.getItem('aiDictionaryFavorites')) || [];

        // DOM 元素
        const totalTermsEl = document.getElementById('total-terms');
        const searchInput = document.getElementById('search-input');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const favoritesBtn = document.getElementById('favorites-btn');
        const cardsContainer = document.getElementById('cards-container');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');
        const enDefinition = document.getElementById('en-definition');
        const zhDefinition = document.getElementById('zh-definition');
        const termImage = document.getElementById('term-image');
        const ref1 = document.getElementById('ref1');
        const ref2 = document.getElementById('ref2');
        const notes = document.getElementById('notes');
        const closeBtn = document.getElementById('close-btn');

        // 初始化
        function init() {
            totalTermsEl.textContent = terms.length;
            renderCards();
            setupEventListeners();
        }

        // 渲染卡片
        function renderCards() {
            let filteredTerms = terms;

            // 分类过滤
            if (currentCategory !== 'all') {
                filteredTerms = filteredTerms.filter(term => term.category === currentCategory);
            }

            // 收藏过滤
            if (showFavorites) {
                filteredTerms = filteredTerms.filter(term => favorites.includes(term.en));
            }

            // 搜索过滤
            const searchTerm = searchInput.value.toLowerCase();
            if (searchTerm) {
                filteredTerms = filteredTerms.filter(term =>
                    term.en.toLowerCase().includes(searchTerm) ||
                    term.zh.toLowerCase().includes(searchTerm)
                );
            }

            cardsContainer.innerHTML = '';
            filteredTerms.forEach(term => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="term">${term.en}</div>
                    <div class="translation">${term.zh}</div>
                    <div class="favorite-icon ${favorites.includes(term.en) ? 'favorited' : ''}" data-term="${term.en}">&#10084;</div>
                `;
                card.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('favorite-icon')) {
                        openModal(term);
                    }
                });
                const favoriteIcon = card.querySelector('.favorite-icon');
                favoriteIcon.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorite(term.en);
                });
                cardsContainer.appendChild(card);
            });
        }

        // 打开弹窗
        function openModal(term) {
            modalTitle.textContent = `${term.en} (${term.zh})`;
            enDefinition.textContent = term.enDef;
            zhDefinition.textContent = term.zhDef;
            termImage.src = term.image;
            ref1.href = term.ref1;
            ref1.textContent = '参考资料 1';
            ref2.href = term.ref2;
            ref2.textContent = '参考资料 2';
            notes.textContent = term.notes;
            modal.classList.add('show');
        }

        // 关闭弹窗
        function closeModal() {
            modal.classList.remove('show');
        }

        // 切换收藏
        function toggleFavorite(term) {
            const index = favorites.indexOf(term);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(term);
            }
            localStorage.setItem('aiDictionaryFavorites', JSON.stringify(favorites));
            renderCards();
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 搜索
            searchInput.addEventListener('input', renderCards);

            // 分类按钮
            filterButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    renderCards();
                });
            });

            // 收藏按钮
            favoritesBtn.addEventListener('click', () => {
                showFavorites = !showFavorites;
                favoritesBtn.textContent = showFavorites ? '显示全部' : '显示收藏';
                renderCards();
            });

            // 关闭弹窗
            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });
        }

        // 初始化应用
        init();
    </script>
</body>
</html>
