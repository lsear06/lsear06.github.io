// ==========================
// 全局状态
// ==========================
let currentList = [...aiTerms];
let favSet = new Set(JSON.parse(localStorage.getItem('aiFavs') || '[]'));
let showFavOnly = false;

// ==========================
// DOM 元素
// ==========================
const cardGrid = document.getElementById('cardGrid');
const empty = document.getElementById('empty');
const search = document.getElementById('search');
const favBtn = document.getElementById('favBtn');
const stats = document.getElementById('stats');
const modal = document.getElementById('modal');
const modalClose = document.getElementById('modalClose');
const backBtn = document.getElementById('backBtn');
const modalEn = document.getElementById('modalEn');
const modalZh = document.getElementById('modalZh');
const modalDefEn = document.getElementById('modalDefEn');
const modalDefZh = document.getElementById('modalDefZh');

// ==========================
// 渲染卡片
// ==========================
function renderCards() {
    cardGrid.innerHTML = '';
    currentList.forEach(term => {
        const card = document.createElement('div');
        card.className = 'card';
        
        const isFav = favSet.has(term.termEn);
        card.innerHTML = `
            <div class="card-fav ${isFav ? 'active' : ''}" data-fav="${term.termEn}">★</div>
            <div class="card-en">${term.termEn}</div>
            <div class="card-zh">${term.termZh}</div>
            <div class="card-preview">${term.definitionEn}</div>
        `;
        card.addEventListener('click', (e) => {
            if (!e.target.hasAttribute('data-fav')) openDetail(term);
        });
        cardGrid.appendChild(card);
    });

    empty.style.display = currentList.length ? 'none' : 'block';
    stats.textContent = `共 ${aiTerms.length} 个术语 · 显示 ${currentList.length} 个`;
    favBtn.textContent = `我的收藏 (${favSet.size})`;
}

// ==========================
// 收藏切换
// ==========================
document.addEventListener('click', (e) => {
    if (e.target.hasAttribute('data-fav')) {
        const en = e.target.dataset.fav;
        if (favSet.has(en)) favSet.delete(en);
        else favSet.add(en);
        localStorage.setItem('aiFavs', JSON.stringify([...favSet]));
        if (showFavOnly) filterFav();
        else renderCards();
    }
});

// ==========================
// 搜索
// ==========================
search.addEventListener('input', (e) => {
    const kw = e.target.value.toLowerCase().trim();
    if (!kw) {
        currentList = showFavOnly ? aiTerms.filter(t => favSet.has(t.termEn)) : [...aiTerms];
        renderCards();
        return;
    }
    currentList = aiTerms.filter(t => 
        t.termEn.toLowerCase().includes(kw) || t.termZh.includes(kw)
    );
    if (showFavOnly) currentList = currentList.filter(t => favSet.has(t.termEn));
    renderCards();
});

// ==========================
// 只看收藏
// ==========================
function filterFav() {
    showFavOnly = true;
    currentList = aiTerms.filter(t => favSet.has(t.termEn));
    renderCards();
}
favBtn.addEventListener('click', () => {
    if (showFavOnly) {
        showFavOnly = false;
        currentList = [...aiTerms];
        if (search.value.trim()) {
            const kw = search.value.toLowerCase().trim();
            currentList = aiTerms.filter(t => 
                t.termEn.toLowerCase().includes(kw) || t.termZh.includes(kw)
            );
        }
    } else filterFav();
    renderCards();
});

// ==========================
// 详情弹窗 + 路由
// ==========================
function openDetail(term) {
    modalEn.textContent = term.termEn;
    modalZh.textContent = term.termZh;
    modalDefEn.textContent = term.definitionEn;
    modalDefZh.textContent = term.definitionZh;
    modal.classList.add('show');
    history.pushState({ page: 'detail', term: term.termEn }, '');
}
function closeDetail() {
    modal.classList.remove('show');
}
modalClose.addEventListener('click', closeDetail);
backBtn.addEventListener('click', () => {
    closeDetail();
    history.back();
});
window.addEventListener('popstate', () => closeDetail());

// ==========================
// 初始化
// ==========================
renderCards();
</script>
</body>
</html>
