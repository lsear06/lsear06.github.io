    { termEn: "Synthetic Data", termZh: "合成数据", definitionEn: "Artificially generated data for model training.", definitionZh: "人工生成的用于模型训练的数据。", category: "train", file: "" },
    { termEn: "Cross Validation", termZh: "交叉验证", definitionEn: "Evaluating model performance across multiple data splits.", definitionZh: "通过多组数据划分评估模型泛化性能。", category: "basic", file: "" }
];

// ==========================
// 全局状态
// ==========================
let currentList = [...aiTerms];
let favSet = new Set(JSON.parse(localStorage.getItem('aiFavs') || '[]'));
let showFavOnly = false;
let currentCategory = "all";

// ==========================
// DOM
// ==========================
const cardGrid = document.getElementById('cardGrid');
const empty = document.getElementById('empty');
const search = document.getElementById('search');
const favBtn = document.getElementById('favBtn');
const libraryBtn = document.getElementById('libraryBtn');
const stats = document.getElementById('stats');
const categoryBtns = document.querySelectorAll('.category-btn');

// ==========================
// 渲染卡片（修复跳转）
// ==========================
function renderCards() {
    cardGrid.innerHTML = '';
    currentList.forEach(term => {
        const card = document.createElement('div');
        card.className = 'card';
        const isFav = favSet.has(term.termEn);
        
        // 生成标准文件名
        const fileName = term.termEn.toLowerCase().replace(/\s+/g, '-') + ".html";
        const targetUrl = "./terms/" + fileName;

        card.innerHTML = `
            <div class="card-fav ${isFav ? 'active' : ''}" data-fav="${term.termEn}">★</div>
            <div class="card-en">${term.termEn}</div>
            <div class="card-zh">${term.termZh}</div>
            <div class="card-preview">${term.definitionEn}</div>
        `;

        // 点击卡片 → 跳转到二级页面（修复版）
        card.onclick = function(e) {
            if (e.target.closest('[data-fav]')) return;
            window.location.href = targetUrl;
        };

        cardGrid.appendChild(card);
    });
    empty.style.display = currentList.length ? 'none' : 'block';
    stats.textContent = `共 ${aiTerms.length} 个术语 · 显示 ${currentList.length} 个`;
    favBtn.textContent = `收藏 (${favSet.size})`;
}

// ==========================
// 收藏功能
// ==========================
document.addEventListener('click', (e) => {
    const favEl = e.target.closest('[data-fav]');
    if (favEl) {
        const en = favEl.dataset.fav;
        favSet.has(en) ? favSet.delete(en) : favSet.add(en);
        localStorage.setItem('aiFavs', JSON.stringify([...favSet]));
        applyFilter();
    }
});

// ==========================
// 分类切换
// ==========================
categoryBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        categoryBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.cat;
        applyFilter();
    });
});

// ==========================
// 过滤
// ==========================
function applyFilter() {
    let list = [...aiTerms];
    if (currentCategory !== 'all') {
        list = list.filter(t => t.category === currentCategory);
    }
    const kw = search.value.toLowerCase().trim();
    if (kw) {
        list = list.filter(t =>
            t.termEn.toLowerCase().includes(kw) || t.termZh.includes(kw)
        );
    }
    if (showFavOnly) {
        list = list.filter(t => favSet.has(t.termEn));
    }
    currentList = list;
    renderCards();
}

search.addEventListener('input', applyFilter);

// ==========================
// 收藏视图
// ==========================
favBtn.addEventListener('click', () => {
    showFavOnly = !showFavOnly;
    applyFilter();
});

// ==========================
// 重置
// ==========================
libraryBtn.addEventListener('click', () => {
    showFavOnly = false;
    currentCategory = "all";
    search.value = "";
    categoryBtns.forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
    applyFilter();
});

// ==========================
// 启动
// ==========================
applyFilter();
</script>
