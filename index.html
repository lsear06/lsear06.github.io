<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI术语中英词典</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background: #f7f9fc;
            color: #2d3748;
            line-height: 1.6;
            padding-bottom: 60px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            color: #2b6cb0;
            margin-bottom: 10px;
        }
        .stats {
            color: #718096;
            font-size: 14px;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
            align-items: center;
        }
        .search {
            flex: 1;
            min-width: 280px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }
        .search:focus {
            border-color: #2b6cb0;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #2b6cb0;
            color: white;
            cursor: pointer;
        }
        .category-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .category-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
        }
        .category-btn.active {
            background: #2b6cb0;
            color: white;
            border-color: #2b6cb0;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            position: relative;
        }
        .card-fav {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 20px;
            color: #cbd5e0;
            cursor: pointer;
        }
        .card-fav.active {
            color: #ffc107;
        }
        .card-en {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .card-zh {
            font-size: 15px;
            color: #4a5568;
            margin-bottom: 12px;
        }
        .card-preview {
            font-size: 13px;
            color: #718096;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>AI 术语中英双语词典</h1>
        <div class="stats" id="stats">共 102 个术语</div>
    </div>
    <div class="toolbar">
        <input type="text" class="search" id="search" placeholder="搜索中文或英文…">
        <button class="btn" id="resetBtn">重置</button>
        <button class="btn" id="favBtn">收藏</button>
    </div>
    <div class="category-bar">
        <button class="category-btn active" data-cat="all">全部</button>
        <button class="category-btn" data-cat="basic">基础</button>
        <button class="category-btn" data-cat="model">模型</button>
        <button class="category-btn" data-cat="train">训练</button>
        <button class="category-btn" data-cat="multi">多模态</button>
        <button class="category-btn" data-cat="deploy">部署</button>
        <button class="category-btn" data-cat="safety">安全</button>
    </div>
    <div class="card-grid" id="cardGrid"></div>
    <div class="empty" id="empty" style="display:none">暂无结果</div>
</div>

<script>
const aiTerms = [
    { termEn: "Machine Learning", termZh: "机器学习", category: "basic" },
    { termEn: "Deep Learning", termZh: "深度学习", category: "basic" },
    { termEn: "Neural Network", termZh: "神经网络", category: "basic" },
    { termEn: "Supervised Learning", termZh: "监督学习", category: "basic" },
    { termEn: "Unsupervised Learning", termZh: "无监督学习", category: "basic" },
    { termEn: "Reinforcement Learning", termZh: "强化学习", category: "basic" },
    { termEn: "Classification", termZh: "分类", category: "basic" },
    { termEn: "Regression", termZh: "回归", category: "basic" },
    { termEn: "Clustering", termZh: "聚类", category: "basic" },
    { termEn: "AGI", termZh: "通用人工智能", category: "basic" }
];

let currentList = [...aiTerms];

function render() {
    const grid = document.getElementById("cardGrid");
    grid.innerHTML = "";
    currentList.forEach(term => {
        const card = document.createElement("div");
        card.className = "card";
        
        // ✅ 绝对路径跳转（永远不会错）
        const fileName = term.termEn.toLowerCase().replace(/ /g, "-") + ".html";
        const url = "/terms/" + fileName;

        card.innerHTML = `
            <div class="card-en">${term.termEn}</div>
            <div class="card-zh">${term.termZh}</div>
        `;

        // ✅ 点击强制跳转（最稳）
        card.onclick = () => { window.open(url, "_blank"); };

        grid.appendChild(card);
    });
}

document.getElementById("search").oninput = (e) => {
    const kw = e.target.value.toLowerCase();
    currentList = aiTerms.filter(t => 
        t.termEn.toLowerCase().includes(kw) || t.termZh.includes(kw)
    );
    render();
};

document.getElementById("resetBtn").onclick = () => {
    currentList = [...aiTerms];
    document.getElementById("search").value = "";
    render();
};

render();
</script>
</body>
</html>
