<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 术语中英词典</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .total-count {
            color: #718096;
            font-size: 16px;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 20px;
            position: relative;
        }

        #search {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }

        #search:focus {
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
            outline: none;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab-btn:hover {
            background-color: #edf2f7;
        }

        .tab-btn.active {
            background-color: #4299e1;
            color: white;
            border-color: #4299e1;
        }

        .card-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .card-en {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .card-zh {
            font-size: 15px;
            color: #718096;
        }

        .favorite-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #cbd5e0;
            transition: color 0.3s;
        }

        .favorite-btn.active {
            color: #f56565;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal {
            background: white;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #718096;
        }

        .modal-title-en {
            font-size: 24px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .modal-title-zh {
            font-size: 18px;
            color: #718096;
            margin-bottom: 20px;
        }

        .modal-section {
            margin-bottom: 20px;
        }

        .modal-section h3 {
            font-size: 16px;
            color: #4a5568;
            margin-bottom: 8px;
            border-left: 3px solid #4299e1;
            padding-left: 8px;
        }

        .modal-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin: 10px 0;
        }

        .modal-link {
            color: #4299e1;
            text-decoration: none;
            display: block;
            margin: 5px 0;
        }

        .modal-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }
            .card-list {
                grid-template-columns: 1fr;
            }
            .modal {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 术语中英词典</h1>
            <p class="total-count">共 <span id="totalNum">0</span> 个术语</p>
        </div>

        <div class="search-box">
            <input type="text" id="search" placeholder="搜索英文/中文术语...">
        </div>

        <div class="category-tabs">
            <button class="tab-btn active" data-category="all">全部</button>
            <button class="tab-btn" data-category="basic">基础</button>
            <button class="tab-btn" data-category="model">模型</button>
            <button class="tab-btn" data-category="train">训练</button>
            <button class="tab-btn" data-category="multi">多模态</button>
            <button class="tab-btn" data-category="deploy">部署</button>
            <button class="tab-btn" data-category="safe">安全</button>
            <button class="tab-btn" data-category="favorite">我的收藏</button>
        </div>

        <div class="card-list" id="cardList"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="close-btn" id="closeBtn">×</button>
            <div class="modal-title-en" id="modalEn"></div>
            <div class="modal-title-zh" id="modalZh"></div>

            <div class="modal-section">
                <h3>英文定义</h3>
                <p id="modalDefEn"></p>
            </div>
            <div class="modal-section">
                <h3>中文定义</h3>
                <p id="modalDefZh"></p>
            </div>
            <div class="modal-section">
                <h3>图片展示</h3>
                <img src="https://picsum.photos/800/400" alt="术语图片" class="modal-img" id="modalImg">
            </div>
            <div class="modal-section">
                <h3>参考资料</h3>
                <span class="modal-link" id="modalLink1">百度百科（待补充）</span>
                <span class="modal-link" id="modalLink2">维基百科（待补充）</span>
            </div>
            <div class="modal-section">
                <h3>补充说明</h3>
                <p id="modalDesc"></p>
            </div>
        </div>
    </div>

<script>
// ========================== 102个AI完整术语（无跳转链接） ==========================
const aiTerms = [
    {id:1,en:"Machine Learning",zh:"机器学习",category:"basic",defEn:"A subset of AI that enables systems to learn from data without explicit programming.",defZh:"人工智能的子集，使系统无需显式编程即可从数据中学习。",img:"https://picsum.photos/800/400?random=1",desc:"机器学习是实现人工智能的核心方法，涵盖监督学习、无监督学习、强化学习等多种范式。links:["百度百科链接", "维基百科链接"]"},
    {id:2,en:"Deep Learning",zh:"深度学习",category:"basic",defEn:"A subset of machine learning based on neural networks with multiple layers.",defZh:"基于多层神经网络的机器学习子集。",img:"https://picsum.photos/800/400?random=2",desc:"深度学习是当前AI的主流技术，广泛应用于计算机视觉、自然语言处理等领域。links:["百度百科链接", "维基百科链接"]"},
    {id:3,en:"Neural Network",zh:"神经网络",category:"model",defEn:"A computing system inspired by biological neural networks in human brains.",defZh:"受人类大脑生物神经网络启发的计算系统。",img:"https://picsum.photos/800/400?random=3",desc:"人工神经网络是深度学习的基础架构，由大量神经元相互连接构成。"links:["百度百科链接", "维基百科链接"]},
    {id:4,en:"Supervised Learning",zh:"监督学习",category:"train",defEn:"A machine learning approach using labeled training data to learn mapping function.",defZh:"使用带标签训练数据学习映射函数的机器学习方法。",img:"https://picsum.photos/800/400?random=4",desc:"常见任务：分类、回归，是工业界最常用的机器学习范式。"},
    {id:5,en:"Unsupervised Learning",zh:"无监督学习",category:"train",defEn:"Learning patterns from unlabeled data without explicit supervision.",defZh:"从无标签数据中学习模式，无需显式监督。",img:"https://picsum.photos/800/400?random=5",desc:"常见任务：聚类、降维、异常检测，适用于无标注数据场景。"},
    {id:6,en:"Semi-supervised Learning",zh:"半监督学习",category:"train",defEn:"Combines small labeled data and large unlabeled data for training.",defZh:"结合少量标注数据和大量无标注数据进行训练的方法。",img:"https://picsum.photos/800/400?random=6",desc:"适用于标注成本高、数据量大的实际场景。"},
    {id:7,en:"Reinforcement Learning",zh:"强化学习",category:"train",defEn:"An agent learns to make decisions by interacting with environment and getting rewards.",defZh:"智能体通过与环境交互并获得奖励来学习决策。",img:"https://picsum.photos/800/400?random=7",desc:"核心思想：试错学习，广泛应用于游戏AI、机器人控制。"},
    {id:8,en:"Classification",zh:"分类",category:"basic",defEn:"A supervised learning task to predict discrete category labels.",defZh:"预测离散类别标签的监督学习任务。",img:"https://picsum.photos/800/400?random=8",desc:"典型应用：图像分类、文本分类、垃圾邮件识别。"},
    {id:9,en:"Regression",zh:"回归",category:"basic",defEn:"A supervised learning task to predict continuous numerical values.",defZh:"预测连续数值的监督学习任务。",img:"https://picsum.photos/800/400?random=9",desc:"典型应用：房价预测、销量预测、金融时序分析。"},
    {id:10,en:"Clustering",zh:"聚类",category:"basic",defEn:"An unsupervised learning task to group similar data points together.",defZh:"将相似数据点归为一类的无监督学习任务。",img:"https://picsum.photos/800/400?random=10",desc:"常见算法：K-Means、DBSCAN、层次聚类。"},
    {id:11,en:"Feature Extraction",zh:"特征提取",category:"basic",defEn:"The process of extracting meaningful features from raw data.",defZh:"从原始数据中提取有意义特征的过程。",img:"https://picsum.photos/800/400?random=11",desc:"是数据预处理的关键步骤，直接影响模型效果。"},
    {id:12,en:"Embedding",zh:"嵌入",category:"basic",defEn:"A low-dimensional vector representation of discrete data in continuous space.",defZh:"离散数据在连续空间中的低维向量表示。",img:"https://picsum.photos/800/400?random=12",desc:"广泛用于词向量、图嵌入、推荐系统、多模态表征。"},
    {id:13,en:"Tokenization",zh:"Token 化",category:"basic",defEn:"The process of splitting text into smaller units called tokens.",defZh:"将文本拆分为更小单元（Token）的过程。",img:"https://picsum.photos/800/400?random=13",desc:"是NLP预处理第一步，决定大语言模型的上下文长度和理解能力。"},
    {id:14,en:"Binary Representation",zh:"二进制表示",category:"basic",defEn:"Representing data using binary numbers 0 and 1 in computing systems.",defZh:"在计算系统中使用0和1表示数据的方式。",img:"https://picsum.photos/800/400?random=14",desc:"是计算机存储和处理所有信息的基础编码方式。"},
    {id:15,en:"AGI",zh:"通用人工智能",category:"basic",defEn:"Artificial General Intelligence that can understand or learn any intellectual task.",defZh:"能够理解或学习任何智力任务的通用人工智能。",img:"https://picsum.photos/800/400?random=15",desc:"是AI的终极目标，具备人类水平的通用认知能力。"},
    {id:16,en:"Precision",zh:"精确率",category:"basic",defEn:"The ratio of true positive predictions among all positive predictions.",defZh:"所有预测为正的样本中，真实为正的比例。",img:"https://picsum.photos/800/400?random=16",desc:"分类模型核心指标，关注预测结果的准确性。"},
    {id:17,en:"Recall",zh:"召回率",category:"basic",defEn:"The ratio of true positive predictions among all actual positive samples.",defZh:"所有真实为正的样本中，被预测为正的比例。",img:"https://picsum.photos/800/400?random=17",desc:"分类模型核心指标，关注真实样本的覆盖度。"},
    {id:18,en:"F1 Score",zh:"F1 分数",category:"basic",defEn:"The harmonic mean of precision and recall for classification evaluation.",defZh:"精确率和召回率的调和平均数，用于分类评估。",img:"https://picsum.photos/800/400?random=18",desc:"平衡精确率与召回率，适用于不平衡数据集评估。"},
    {id:19,en:"Accuracy",zh:"准确率",category:"basic",defEn:"The ratio of correct predictions among all total predictions.",defZh:"所有预测结果中，预测正确的比例。",img:"https://picsum.photos/800/400?random=19",desc:"最直观的模型评估指标，适用于平衡数据集。"},
    {id:20,en:"Dataset",zh:"数据集",category:"train",defEn:"A collection of data used for model training, validation and testing.",defZh:"用于模型训练、验证和测试的数据集合。",img:"https://picsum.photos/800/400?random=20",desc:"分为训练集、验证集、测试集，是机器学习的生产原料。"},
    {id:21,en:"Cross Validation",zh:"交叉验证",category:"train",defEn:"A statistical method to evaluate and compare machine learning models.",defZh:"评估和比较机器学习模型的统计方法。",img:"https://picsum.photos/800/400?random=21",desc:"有效避免过拟合，充分利用有限数据评估模型性能。"},
    {id:22,en:"Tensor",zh:"张量",category:"model",defEn:"A multi-dimensional array of numerical values used in deep learning frameworks.",defZh:"深度学习框架中使用的多维数值数组。",img:"https://picsum.photos/800/400?random=22",desc:"是PyTorch、TensorFlow等框架的基础数据结构。"},
    {id:23,en:"Transformer",zh:"Transformer",category:"model",defEn:"A deep learning model based on self-attention mechanism proposed in 2017.",defZh:"2017年提出的基于自注意力机制的深度学习模型。",img:"https://picsum.photos/800/400?random=23",desc:"彻底改变NLP领域，成为大语言模型的基础架构。"},
    {id:24,en:"Large Language Model",zh:"大语言模型",category:"model",defEn:"A language model with large parameters trained on massive text corpora.",defZh:"在海量文本语料上训练的大参数量语言模型。",img:"https://picsum.photos/800/400?random=24",desc:"代表：GPT、LLaMA、文心一言、通义千问。"},
    {id:25,en:"CNN",zh:"卷积神经网络",category:"model",defEn:"Convolutional Neural Network specialized for grid data like images.",defZh:"专门处理图像等网格数据的卷积神经网络。",img:"https://picsum.photos/800/400?random=25",desc:"计算机视觉领域的经典模型，擅长提取局部特征。"},
    {id:26,en:"RNN",zh:"循环神经网络",category:"model",defEn:"Recurrent Neural Network for processing sequential data with memory.",defZh:"具有记忆功能、用于处理序列数据的循环神经网络。",img:"https://picsum.photos/800/400?random=26",desc:"适用于文本、语音等时序数据，但存在长序列梯度消失问题。"},
    {id:27,en:"LSTM",zh:"长短期记忆网络",category:"model",defEn:"Long Short-Term Memory, an improved RNN to solve gradient vanishing.",defZh:"长短期记忆网络，解决梯度消失问题的改进型RNN。",img:"https://picsum.photos/800/400?random=27",desc:"有效捕捉长序列依赖，广泛用于NLP和时序预测。"},
    {id:28,en:"GRU",zh:"门控循环单元",category:"model",defEn:"Gated Recurrent Unit, a simplified and efficient version of LSTM.",defZh:"门控循环单元，简化高效的LSTM变体。",img:"https://picsum.photos/800/400?random=28",desc:"参数更少、训练更快，性能接近LSTM。"},
    {id:29,en:"Self-Attention",zh:"自注意力",category:"model",defEn:"A mechanism to model dependencies between all positions in a sequence.",defZh:"建模序列中所有位置之间依赖关系的机制。",img:"https://picsum.photos/800/400?random=29",desc:"Transformer的核心，让模型关注输入序列的重要部分。"},
    {id:30,en:"MoE",zh:"混合专家模型",category:"model",defEn:"Mixture of Experts, a model architecture combining multiple expert networks.",defZh:"混合专家模型，结合多个专家网络的模型架构。",img:"https://picsum.photos/800/400?random=30",desc:"支持超大规模模型高效训练，代表：GPT-4、PaLM。"},
    {id:31,en:"GPT",zh:"GPT",category:"model",defEn:"Generative Pre-trained Transformer, a series of large language models.",defZh:"生成式预训练Transformer，大语言模型系列。",img:"https://picsum.photos/800/400?random=31",desc:"OpenAI发布的代表性生成式大语言模型系列。"},
    {id:32,en:"BERT",zh:"BERT",category:"model",defEn:"Bidirectional Encoder Representations from Transformers for NLP tasks.",defZh:"用于NLP任务的双向Transformer编码器表示。",img:"https://picsum.photos/800/400?random=32",desc:"谷歌发布的经典预训练模型，擅长理解类NLP任务。"},
    {id:33,en:"Mamba",zh:"Mamba",category:"model",defEn:"A state space model for efficient long-sequence processing.",defZh:"用于高效长序列处理的状态空间模型。",img:"https://picsum.photos/800/400?random=33",desc:"新一代序列模型，长文本处理效率远超Transformer。"},
    {id:34,en:"GAN",zh:"生成对抗网络",category:"model",defEn:"Generative Adversarial Network with generator and discriminator.",defZh:"包含生成器和判别器的生成对抗网络。",img:"https://picsum.photos/800/400?random=34",desc:"生成式模型经典架构，广泛用于图像、视频生成。"},
    {id:35,en:"VAE",zh:"变分自编码器",category:"model",defEn:"Variational Autoencoder, a generative model based on autoencoder.",defZh:"基于自编码器的生成式模型。",img:"https://picsum.photos/800/400?random=35",desc:"可控生成数据，具备良好的隐空间表征能力。"},
    {id:36,en:"Diffusion Model",zh:"扩散模型",category:"model",defEn:"A generative model learning to reverse diffusion process for data generation.",defZh:"学习逆转扩散过程进行数据生成的生成模型。",img:"https://picsum.photos/800/400?random=36",desc:"当前AIGC的主流模型，生成质量远超GAN。"},
    {id:37,en:"RLHF",zh:"人类反馈强化学习",category:"train",defEn:"Reinforcement Learning from Human Feedback to align models with humans.",defZh:"基于人类反馈的强化学习，让模型与人类意图对齐。",img:"https://picsum.photos/800/400?random=37",desc:"大语言模型对齐的核心技术，代表：ChatGPT训练流程。"},
    {id:38,en:"Context Window",zh:"上下文窗口",category:"model",defEn:"The maximum length of input text a LLM can process at one time.",defZh:"大语言模型一次能处理的最大输入文本长度。",img:"https://picsum.photos/800/400?random=38",desc:"决定模型能接收的文本量，越长越能理解长文档。"},
    {id:39,en:"CLIP",zh:"CLIP",category:"multi",defEn:"Contrastive Language-Image Pre-training for multi-modal representation.",defZh:"用于多模态表征的对比语言-图像预训练模型。",img:"https://picsum.photos/800/400?random=39",desc:"OpenAI发布，连接文本与图像的经典多模态模型。"},
    {id:40,en:"SAM",zh:"分割任何模型",category:"multi",defEn:"Segment Anything Model for universal image segmentation.",defZh:"用于通用图像分割的模型。",img:"https://picsum.photos/800/400?random=40",desc:"Meta发布的通用图像分割基础模型。"},
    {id:41,en:"Stable Diffusion",zh:"Stable Diffusion",category:"multi",defEn:"An open-source text-to-image diffusion model.",defZh:"开源的文本生成图像扩散模型。",img:"https://picsum.photos/800/400?random=41",desc:"最流行的开源文生图模型，支持本地部署。"},
    {id:42,en:"DALL·E",zh:"DALL·E",category:"multi",defEn:"OpenAI's text-to-image generation model series.",defZh:"OpenAI的文本生成图像模型系列。",img:"https://picsum.photos/800/400?random=42",desc:"商用级文生图模型，生成效果顶尖。"},
    {id:43,en:"Flux",zh:"Flux",category:"multi",defEn:"A high-performance text-to-image generation model.",defZh:"高性能文本生成图像模型。",img:"https://picsum.photos/800/400?random=43",desc:"新一代文生图模型，速度与画质大幅提升。"},
    {id:44,en:"Pre-training",zh:"预训练",category:"train",defEn:"Initial training on large-scale unlabeled data to get general features.",defZh:"在大规模无标签数据上的初始训练，学习通用特征。",img:"https://picsum.photos/800/400?random=44",desc:"大模型的第一步，耗时耗力，学习通用知识。"},

// DOM元素获取
const cardList = document.getElementById('cardList');
const totalNum = document.getElementById('totalNum');
const searchInput = document.getElementById('search');
const tabBtns = document.querySelectorAll('.tab-btn');
const modalOverlay = document.getElementById('modalOverlay');
const closeBtn = document.getElementById('closeBtn');
const modalEn = document.getElementById('modalEn');
const modalZh = document.getElementById('modalZh');
const modalDefEn = document.getElementById('modalDefEn');
const modalDefZh = document.getElementById('modalDefZh');
const modalImg = document.getElementById('modalImg');
const modalLink1 = document.getElementById('modalLink1');
const modalLink2 = document.getElementById('modalLink2');
const modalDesc = document.getElementById('modalDesc');

// 全局变量
let currentCategory = 'all';
let favoriteList = JSON.parse(localStorage.getItem('aiFavorite')) || [];

// 初始化
totalNum.textContent = aiTerms.length;
renderCards(aiTerms);

// 渲染卡片列表
function renderCards(data) {
    cardList.innerHTML = '';
    if (data.length === 0) {
        cardList.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #718096;">暂无匹配的术语</div>';
        return;
    }
    
    data.forEach(item => {
        const isFavorite = favoriteList.includes(item.id);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <button class="favorite-btn ${isFavorite ? 'active' : ''}" data-id="${item.id}">★</button>
            <div class="card-en">${item.en}</div>
            <div class="card-zh">${item.zh}</div>
        `;
        cardList.appendChild(card);

        // 卡片点击打开详情弹窗
        card.addEventListener('click', (e) => {
            if (!e.target.classList.contains('favorite-btn')) openModal(item);
        });

        // 收藏按钮点击事件
        const favBtn = card.querySelector('.favorite-btn');
        favBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFavorite(item.id);
            favBtn.classList.toggle('active');
        });
    });
}

// 打开详情弹窗
function openModal(item) {
    modalEn.textContent = item.en;
    modalZh.textContent = item.zh;
    modalDefEn.textContent = item.defEn;
    modalDefZh.textContent = item.defZh;
    modalImg.src = item.img || 'https://picsum.photos/800/400';
    modalDesc.innerHTML = item.desc || '暂无补充说明';
    
    modalOverlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

// 关闭弹窗
function closeModal() {
    modalOverlay.style.display = 'none';
    document.body.style.overflow = 'auto';
}

// 切换收藏状态
function toggleFavorite(id) {
    const index = favoriteList.indexOf(id);
    if (index === -1) {
        favoriteList.push(id);
    } else {
        favoriteList.splice(index, 1);
    }
    localStorage.setItem('aiFavorite', JSON.stringify(favoriteList));
    
    // 如果当前在收藏标签页，重新渲染
    if (currentCategory === 'favorite') {
        filterCards();
    }
}

// 筛选卡片（分类+搜索）
function filterCards() {
    let filteredData = [...aiTerms];
    
    // 分类筛选
    if (currentCategory === 'favorite') {
        filteredData = aiTerms.filter(item => favoriteList.includes(item.id));
    } else if (currentCategory !== 'all') {
        filteredData = aiTerms.filter(item => item.category === currentCategory);
    }
    
    // 搜索筛选
    const keyword = searchInput.value.trim().toLowerCase();
    if (keyword) {
        filteredData = filteredData.filter(item => 
            item.en.toLowerCase().includes(keyword) || 
            item.zh.includes(keyword)
        );
    }
    
    renderCards(filteredData);
}

// 事件监听
searchInput.addEventListener('input', filterCards);

tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        filterCards();
    });
});

closeBtn.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
});

// 按ESC键关闭弹窗
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});
</script>
