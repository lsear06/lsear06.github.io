<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .total-count {
            color: #718096;
            font-size: 16px;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 20px;
            position: relative;
        }

        #search {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        #search:focus {
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab-btn:hover {
            background-color: #edf2f7;
        }

        .tab-btn.active {
            background-color: #4299e1;
            color: white;
            border-color: #4299e1;
        }

        .card-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .card-en {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .card-zh {
            font-size: 15px;
            color: #718096;
        }

        .favorite-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #cbd5e0;
            transition: color 0.3s;
        }

        .favorite-btn.active {
            color: #f56565;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal {
            background: white;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #718096;
        }

        .modal-title-en {
            font-size: 24px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .modal-title-zh {
            font-size: 18px;
            color: #718096;
            margin-bottom: 20px;
        }

        .modal-section {
            margin-bottom: 20px;
        }

        .modal-section h3 {
            font-size: 16px;
            color: #4a5568;
            margin-bottom: 8px;
            border-left: 3px solid #4299e1;
            padding-left: 8px;
        }

        .modal-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin: 10px 0;
        }

        .modal-link {
            color: #4299e1;
            text-decoration: none;
            display: block;
            margin: 5px 0;
        }

        .modal-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }
            .card-list {
                grid-template-columns: 1fr;
            }
            .modal {
                padding: 20px;
            }
        }
    </style>
</head>

const cardList = document.getElementById('cardList');
const totalNum = document.getElementById('totalNum');
const searchInput = document.getElementById('search');
const tabBtns = document.querySelectorAll('.tab-btn');

const modalZh = document.getElementById('modalZh');
const modalDefEn = document.getElementById('modalDefEn');
const modalDefZh = document.getElementById('modalDefZh');
const modalImg = document.getElementById('modalImg');
const modalLink1 = document.getElementById('modalLink1');
const modalLink2 = document.getElementById('modalLink2');
const modalDesc = document.getElementById('modalDesc');

let currentCategory = 'all';
let favoriteList = JSON.parse(localStorage.getItem('aiFavorite')) || [];
totalNum.textContent = aiTerms.length;
renderCards(aiTerms);

function renderCards(data) {
    cardList.innerHTML = '';
    data.forEach(item => {
        const isFavorite = favoriteList.includes(item.id);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <button class="favorite-btn ${isFavorite ? 'active' : ''}" data-id="${item.id}">★</button>
            <div class="card-en">${item.en}</div>
            <div class="card-zh">${item.zh}</div>
        `;
        cardList.appendChild(card);

        card.addEventListener('click', (e) => {
            if (!e.target.classList.contains('favorite-btn')) openModal(item);
        });

        const favBtn = card.querySelector('.favorite-btn');
        favBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFavorite(item.id);
            favBtn.classList.toggle('active');
        });
    });
}

function openModal(item) {
    modalEn.textContent = item.en;
    modalZh.textContent = item.zh;
    modalDefEn.textContent = item.defEn;
    modalDefZh.textContent = item.defZh;
    modalImg.src = item.img || 'https://picsum.photos/800/400';
    modalLink1.href = item.links[0];
    modalLink1.textContent = item.links[0] || '暂无链接';
    modalLink2.href = item.links[1];
    modalLink2.textContent = item.links[1] || '暂无链接';
    modalDesc.innerHTML = item.desc || '暂无补充说明';
    modalOverlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    modalOverlay.style.display = 'none';
    document.body.style.overflow = 'auto';
}

function toggleFavorite(id) {
    const index = favoriteList.indexOf(id);
    index === -1 ? favoriteList.push(id) : favoriteList.splice(index, 1);
    localStorage.setItem('aiFavorite', JSON.stringify(favoriteList));
    if (currentCategory === 'favorite') filterCards();
}

function filterCards() {
    let filtered = aiTerms;
    if (currentCategory === 'favorite') {
        filtered = aiTerms.filter(item => favoriteList.includes(item.id));
    } else if (currentCategory !== 'all') {
        filtered = aiTerms.filter(item => item.category === currentCategory);
    }
    const keyword = searchInput.value.toLowerCase().trim();
    if (keyword) {
        filtered = filtered.filter(item =>
            item.en.toLowerCase().includes(keyword) || item.zh.includes(keyword)
        );
    }
    renderCards(filtered);
}

searchInput.addEventListener('input', filterCards);
tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        filterCards();
    });
});
closeBtn.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => e.target === modalOverlay && closeModal());
document.addEventListener('keydown', e => e.key === 'Escape' && closeModal());
</script>
</body>
</html>
