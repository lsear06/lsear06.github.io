    <button class="fav-btn" onclick="toggleFav('Transformer')">⭐ 收藏术语</button>
</div>

<script>
function getFavs() {
    return JSON.parse(localStorage.getItem('aiFavorites') || '[]');
}
function toggleFav(name) {
    let favs = getFavs();
    if (favs.includes(name)) {
        favs = favs.filter(x => x !== name);
        alert('已取消收藏');
    } else {
        favs.push(name);
        alert('已添加收藏');
    }
    localStorage.setItem('aiFavorites', JSON.stringify(favs));
}
</script>
